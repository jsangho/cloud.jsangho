services:
  # ① 백엔드 서비스 (FastAPI)
  backend:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./fastapi/.env

  # ② n8n 워크플로우 자동화
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n

  # ③ 프런트엔드 서비스 (Next.js)
  frontend:
    build:
      context: ./www
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./www/.env.local
    environment:
      INTERNAL_API_BASE_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  n8n_data:
    external: true
