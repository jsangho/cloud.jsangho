services:
  # ① 백엔드 서비스 (FastAPI)
  backend:
    build:
      context: ./sangho
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./sangho/.env

  # ② 프런트엔드 서비스 (Next.js)
  frontend:
    build:
      context: ./www
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./www/.env.local
    environment:
      INTERNAL_API_BASE_URL: http://backend:8000
    depends_on:
      - backend
